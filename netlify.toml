[build]
  publish = "."
  command = "VERSION=$(git rev-parse --short HEAD) && DATE=$(LC_TIME=fr_FR.UTF-8 date +'%d %B %Y' 2>/dev/null || date +'%d/%m/%Y') && sed -i \"s|__VERSION__|v${VERSION}|g\" index.html && sed -i \"s|__DATE__|${DATE}|g\" index.html"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "http://paradisdunefemme.netlify.app/*"
  to = "https://www.paradisdunefemme.com/:splat"
  status = 301
  force = true
